<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Nährwerte – Röckles Wengert</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --green-bg: #2f6b3a;
      --font-main: Calibri, "Segoe UI", sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--green-bg);
      color: #ffffff;
      font-family: var(--font-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
    }

    .container {
      max-width: 700px;
    }

    h2 {
      font-size: 1.2rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.9;
      margin-bottom: 24px;
      font-style: normal;
      font-weight: 400;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    .divider {
      width: 90px;
      height: 1px;
      background: #ffffff;
      margin: 20px auto 40px;
      opacity: 0.7;
    }

    .nutrition {
      font-size: 1.2rem;
      line-height: 1.6;
      white-space: pre-line;
      opacity: 0.95;
      font-style: normal;
    }

    .footer {
      margin-top: 40px;
      font-size: 1rem;
      opacity: 0.85;
      font-style: normal;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="container">

    <h2>Nährwertangaben</h2>
    <h1>Röckles Wengert – Weißwein 2023</h1>

    <div class="divider"></div>

    <div class="nutrition">
Brennwert:        293 kJ / 70 kcal
Fett:             0 g
davon gesättigt:  0 g
Kohlenhydrate:    2,6 g
davon Zucker:     2,6 g
Eiweiß:           0,1 g
Salz:             0 g
    </div>

    <div class="footer">
      Wein. Handwerk. Heimat.
    </div>

  </div>
</body>
</html>
