<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Röckles Wengert – Willkommen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --green-bg: #2f6b3a;
      --font-main: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--green-bg);
      color: #ffffff;
      font-family: var(--font-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
    }

    .container {
      max-width: 600px;
    }

    h1 {
      font-size: 2.6rem;
      font-weight: 500;
      margin-bottom: 6px;
    }

    h2 {
      font-size: 1.1rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.9;
      margin-bottom: 24px;
    }

    .divider {
      width: 90px;
      height: 1px;
      background: #ffffff;
      margin: 20px auto;
      opacity: 0.7;
    }

    /* Trauben-Icon */
    .grape-icon {
      margin: 24px auto 0;
      width: 90px;
      height: 70px;
      position: relative;
    }

    .grape-icon::before,
    .grape-icon::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      border: 1px solid #ffffff;
      opacity: 0.9;
    }

    .grape-icon::before {
      width: 16px;
      height: 16px;
      left: 22px;
      top: 30px;
      box-shadow:
        18px 0 0 0 #0000,
        9px -14px 0 0 #0000,
        27px -14px 0 0 #0000;
    }

    .grape-icon::after {
      width: 16px;
      height: 16px;
      left: 30px;
      top: 45px;
      box-shadow:
        18px 0 0 0 #0000,
        -9px 0 0 0 #0000;
    }

    .grape-stem {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1px solid #ffffff;
      border-bottom-color: transparent;
      border-left-color: transparent;
      position: absolute;
      left: 22px;
      top: 6px;
      transform: rotate(-25deg);
    }

    .footer {
      margin-top: 40px;
      font-size: 0.85rem;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Herzlich Willkommen</h2>
    <h1>Röckles Wengert</h1>

    <div class="divider"></div>

    <div class="grape-icon">
      <div class="grape-stem"></div>
    </div>

    <div class="footer">
      <p>Wein. Handwerk. Heimat.</p>
    </div>
  </div>
</body>
</html>
