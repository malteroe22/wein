<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Röckles Wengert – Willkommen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Cormorant Garamond einbinden -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --green-bg: #2f6b3a;
      --font-main: 'Cormorant Garamond', serif;
      --font-quote: 'Cormorant Garamond', serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--green-bg);
      color: #ffffff;
      font-family: var(--font-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
    }

    .container {
      max-width: 700px;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 600;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    h2 {
      font-size: 1.2rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.9;
      margin-bottom: 24px;
      font-weight: 500;
    }

    .divider {
      width: 90px;
      height: 1px;
      background: #ffffff;
      margin: 20px auto 40px;
      opacity: 0.7;
    }

    .quote {
      font-family: var(--font-quote);
      font-size: 1.7rem;
      line-height: 1.45;
      font-weight: 500;
      font-style: italic; /* Kursiv */
      white-space: pre-line;
      opacity: 0.95;
    }

    .footer {
      margin-top: 40px;
      font-size: 1rem;
      opacity: 0.85;
      font-weight: 500;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Herzlich Willkommen</h2>
    <h1>Röckles Wengert</h1>

    <div class="divider"></div>

    <div class="quote">
You should always say yes to a
quick 30 minute drink with friends,
because that hour and a half could
be the best 5 hours of your life.
    </div>

    <div class="footer">
      <p>Wein. Handwerk. Heimat.</p>
    </div>
  </div>
</body>
</html>
